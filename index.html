<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計工程表</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%233b82f6'/><text x='50' y='74' font-family='sans-serif' font-size='65' font-weight='bold' fill='white' text-anchor='middle'>設</text></svg>">
    <!-- DHTMLX Gantt -->
    <link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
    <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
    <!-- Pro版（リソース機能）が必要な場合は、ライセンス版のJSを読み込む必要があります -->
    <!-- 現在はCDNのedge版（通常はStandard版）を読み込んでいるため、一部のPro機能が制限されている可能性があります -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="page_loading_overlay" style="position:fixed;inset:0;background:#fff;z-index:9999;"></div>
    <div class="main-container">
        <div class="header-panel">
            <div class="header-row" id="filter_btn_row">
                <button class="btn btn-filter" id="resource_home_btn" onclick="returnToResourceView()">👤 担当別</button>
                <button class="btn btn-filter" id="plan_filter_btn" onclick="togglePlanFilter()">📋 計画</button>
                <button class="btn btn-filter" id="drawing_filter_btn" onclick="toggleDrawingFilter()">🔧 試運転</button>
                <button class="btn btn-filter" id="trip_filter_btn" onclick="toggleTripFilter()">✈ 出張</button>
                <div class="zoom-controls" style="margin-left: auto;">
                    <button class="btn" id="help_btn" onclick="openHelp()">？使い方ガイド</button>
                    <button class="btn btn-auth" id="auth_btn" onclick="handleAuthBtn()">ログイン</button>
                </div>
            </div>
            <div class="header-row" id="project_info_row">
                <div class="zoom-controls">
                    <button class="btn zoom-btn active" id="zoom_day_btn" onclick="setZoom('day', this)">日単位</button>
                    <button class="btn zoom-btn" id="zoom_week_btn" onclick="setZoom('week', this)">週単位</button>
                </div>
            </div>
            <div class="header-row" id="dropdowns_row">
                <div id="project_filter_wrap" style="position:relative;">
                    <button type="button" id="project_filter_btn" onclick="toggleProjectFilterDropdown()" class="header-select" style="white-space:nowrap; text-align:left;">工事番号: 全表示</button>
                    <div id="project_filter_dropdown" style="display:none; position:absolute; top:calc(100% + 2px); left:0; background:#fff; border:1px solid #ccc; border-radius:3px; z-index:9999; padding:4px 0; min-width:160px; max-height:300px; overflow-y:auto; box-shadow:0 2px 8px rgba(0,0,0,0.15);">
                        <label style="display:block; padding:4px 10px; cursor:pointer; white-space:nowrap; font-size:13px; font-family:'メイリオ',Meiryo,sans-serif;">
                            <input type="checkbox" id="project_chk_all" onchange="projectFilterAllChanged(this)" checked> 全表示
                        </label>
                        <div style="border-top:1px solid #eee; margin:2px 0;"></div>
                        <div id="project_chk_list"></div>
                        <div style="border-top:1px solid #eee; margin:2px 0;"></div>
                        <div style="padding:4px 8px; display:flex; gap:4px;">
                            <input type="text" id="new_project_input" placeholder="新しい工事番号" style="font-size:12px; font-family:'メイリオ',Meiryo,sans-serif; width:100px; padding:2px 4px; border:1px solid #ccc; border-radius:3px;">
                            <button type="button" onclick="addNewProjectFilter()" style="font-size:12px; font-family:'メイリオ',Meiryo,sans-serif; padding:2px 6px; cursor:pointer;">追加</button>
                        </div>
                    </div>
                </div>
                <div id="machine_filter_wrap" style="position:relative; display:none;">
                    <button type="button" id="machine_filter_btn" onclick="toggleMachineFilterDropdown()" class="header-select" style="white-space:nowrap; text-align:left;">機械: すべて</button>
                    <div id="machine_filter_dropdown" style="display:none; position:absolute; top:calc(100% + 2px); left:0; background:#fff; border:1px solid #ccc; border-radius:3px; z-index:9999; padding:4px 0; min-width:130px; max-height:300px; overflow-y:auto; box-shadow:0 2px 8px rgba(0,0,0,0.15);">
                        <label style="display:block; padding:4px 10px; cursor:pointer; white-space:nowrap; font-size:13px; font-family:'メイリオ',Meiryo,sans-serif;">
                            <input type="checkbox" id="machine_chk_all" onchange="machineFilterAllChanged(this)" checked> すべて
                        </label>
                        <div style="border-top:1px solid #eee; margin:2px 0;"></div>
                        <div id="machine_chk_list"></div>
                    </div>
                </div>
                <div id="unit_filter_wrap" style="position:relative; display:none;">
                    <button type="button" id="unit_filter_btn" onclick="toggleUnitFilterDropdown()" class="header-select" style="white-space:nowrap; text-align:left;">ユニット: すべて</button>
                    <div id="unit_filter_dropdown" style="display:none; position:absolute; top:calc(100% + 2px); left:0; background:#fff; border:1px solid #ccc; border-radius:3px; z-index:9999; padding:4px 0; min-width:130px; max-height:300px; overflow-y:auto; box-shadow:0 2px 8px rgba(0,0,0,0.15);">
                        <label style="display:block; padding:4px 10px; cursor:pointer; white-space:nowrap; font-size:13px; font-family:'メイリオ',Meiryo,sans-serif;">
                            <input type="checkbox" id="unit_chk_all" onchange="unitFilterAllChanged(this)" checked> すべて
                        </label>
                        <div style="border-top:1px solid #eee; margin:2px 0;"></div>
                        <div id="unit_chk_list"></div>
                    </div>
                </div>
                <div id="owner_filter_wrap" style="position:relative; display:none;">
                    <button type="button" id="owner_filter_btn" onclick="toggleOwnerFilterDropdown()" class="header-select" style="white-space:nowrap; text-align:left;">担当者: 全員</button>
                    <div id="owner_filter_dropdown" style="display:none; position:absolute; top:calc(100% + 2px); left:0; background:#fff; border:1px solid #ccc; border-radius:3px; z-index:9999; padding:4px 0; min-width:130px; max-height:300px; overflow-y:auto; box-shadow:0 2px 8px rgba(0,0,0,0.15);">
                        <label style="display:block; padding:4px 10px; cursor:pointer; white-space:nowrap; font-size:13px; font-family:'メイリオ',Meiryo,sans-serif;">
                            <input type="checkbox" id="owner_chk_all" onchange="ownerFilterAllChanged(this)" checked> 全員
                        </label>
                        <div style="border-top:1px solid #eee; margin:2px 0;"></div>
                        <div id="owner_chk_list"></div>
                    </div>
                </div>
                <button class="btn btn-info" id="resource_toggle" onclick="toggleResourceView()">リソース表示</button>
                <button class="btn btn-primary" id="create_task_btn" onclick="createTask()" style="display:none;">+ 新規タスク追加</button>
                <div class="action-controls">
                    <button class="btn" id="multi_delete_btn" onclick="deleteSelectedTasks()" style="display:none;">選択削除 (<span id="multi_delete_count">0</span>件)</button>
                    <div style="position:relative;display:none;" id="archive_btn_wrap">
                        <button class="btn" onclick="toggleArchiveMenu(event)">アーカイブ ▼</button>
                        <div id="archive_dropdown_menu">
                            <div onclick="openArchiveManager()">アーカイブ管理</div>
                            <div onclick="openArchiveList()">アーカイブ一覧</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="gantt-host" id="gantt_host">
            <div id="gantt_here" style="width:100%;"></div>
        </div>

        <!-- 独立したリソースパネル -->
        <div id="resource_panel">
            <div id="resource_resizer"></div>
            <div id="resource_zoom_bar" style="display:none; height:32px; background:#f5f5f5; border-bottom:1px solid #ddd; flex-shrink:0; align-items:center; padding:0 8px; gap:6px;">
                <button class="btn zoom-btn" id="resource_zoom_day_btn" onclick="setZoom('day', this)">日単位</button>
                <button class="btn zoom-btn" id="resource_zoom_week_btn" onclick="setZoom('week', this)">週単位</button>
            </div>
            <div class="resource-header-bar">
                <div style="display:flex; align-items:center;">
                    <span id="resource_title">担当者別リソース状況</span>
                    <button type="button" class="btn" id="resource_back_btn" onclick="showOwnerOverview()" style="display:none; font-size:11px; padding:2px 8px; margin-left:50px; font-family:'メイリオ',Meiryo,sans-serif;">← 一覧に戻る</button>
                </div>
                <button type="button" class="resource-header-close" id="resource_close_btn" title="リソース画面を閉じる">×</button>
            </div>
            <div id="resource_calendar_header"></div>
            <div class="resource-content">
                <div id="resource_content_inner" class="resource-content-inner">
                    <!-- ここにJSでHTMLが挿入される -->
                </div>
            </div>
        </div>
    </div>


    <!-- アーカイブ管理モーダル -->
    <div class="archive-overlay" id="archive_manager_overlay">
        <div class="archive-dialog">
            <h3>アーカイブ管理</h3>
            <div class="archive-table" id="archive_manager_table"></div>
            <div class="archive-dialog-footer">
                <button class="btn" onclick="closeArchiveManager()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- アーカイブ一覧モーダル -->
    <div class="archive-overlay" id="archive_list_overlay">
        <div class="archive-dialog">
            <h3 id="archive_list_title">アーカイブ一覧</h3>
            <div class="archive-table" id="archive_list_table"></div>
            <div class="archive-dialog-footer">
                <button class="btn" onclick="closeArchiveList()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- タスク詳細モーダル -->
    <div class="archive-overlay" id="archive_detail_overlay">
        <div id="archive_detail_dialog">
            <h3 id="archive_detail_title">タスク一覧</h3>
            <div class="archive-tabs">
                <button class="archive-tab-btn" id="dtab_drawing"        onclick="switchArchiveDetailTab('drawing')">図面</button>
                <button class="archive-tab-btn" id="dtab_long_lead_item" onclick="switchArchiveDetailTab('long_lead_item')">長納期品</button>
                <button class="archive-tab-btn" id="dtab_business_trip"  onclick="switchArchiveDetailTab('business_trip')">出張</button>
                <button class="archive-tab-btn" id="dtab_planning"       onclick="switchArchiveDetailTab('planning')">計画</button>
            </div>
            <div class="archive-table" id="archive_detail_table"></div>
            <div class="archive-dialog-footer">
                <button class="btn btn-info" onclick="openArchiveCopyFromDetail()">このモードをコピー</button>
                <button class="btn" onclick="closeArchiveDetail()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- コピー先工事番号入力ダイアログ -->
    <div class="archive-overlay" id="archive_copy_overlay">
        <div class="archive-dialog" style="width:340px; max-height:none;">
            <h3>工事番号を入力してコピー</h3>
            <div style="margin-bottom:8px; font-size:12px; color:#555;">
                コピー元: <span id="archive_copy_src"></span>
            </div>
            <div style="margin-bottom:14px;">
                <label style="font-size:12px; display:block; margin-bottom:4px;">新しい工事番号</label>
                <input type="text" id="archive_copy_input" style="width:100%; box-sizing:border-box; padding:6px 8px; font-size:13px; border:1px solid #ccc; border-radius:3px; font-family:'メイリオ',Meiryo,sans-serif;">
            </div>
            <div class="archive-dialog-footer">
                <button class="btn" onclick="closeArchiveCopy()">キャンセル</button>
                <button class="btn btn-primary" onclick="executeArchiveCopy()">コピーして追加</button>
            </div>
        </div>
    </div>

    <!-- 複数行一括編集モーダル -->
    <div class="archive-overlay" id="multi_edit_overlay">
        <div class="archive-dialog" style="width:760px; max-width:96vw;">
            <h3>選択した行を一括編集</h3>
            <div id="multi_edit_count_label" style="margin-bottom:10px; font-size:12px; color:#555;"></div>
            <div id="multi_edit_form" class="multi-edit-grid"></div>
            <div style="margin-top:8px; font-size:11px; color:#666;">※ 各項目は入力したものだけ更新されます（空欄は変更しません）</div>
            <div class="archive-dialog-footer">
                <button class="btn" onclick="closeMultiEditModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="applyMultiEdit()">選択行を更新</button>
            </div>
        </div>
    </div>

<!-- ===== パスワード設定ダイアログ（招待メール・パスワードリセット用） ===== -->
<div id="setpw_overlay">
    <div id="setpw_dialog">
        <h2>パスワードを設定してください</h2>
        <p>設計工程表で使用するパスワードを設定します</p>
        <input type="password" id="setpw_pw1" placeholder="新しいパスワード（8文字以上）">
        <input type="password" id="setpw_pw2" placeholder="パスワードを再入力"
               onkeydown="if(event.key==='Enter') doSetPassword()">
        <div id="setpw_error"></div>
        <button id="setpw_btn_submit" onclick="doSetPassword()">パスワードを設定する</button>
    </div>
</div>

<!-- ===== ヘルプツールチップコンテナ ===== -->
<div id="help_tips_container"></div>

<!-- ===== ログインダイアログ ===== -->
<div id="login_overlay">
    <div id="login_dialog">
        <h2>設計工程表 ログイン</h2>
        <input type="email" id="login_email" placeholder="メールアドレス" autocomplete="email">
        <input type="password" id="login_password" placeholder="パスワード" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()">
        <div id="login_error"></div>
        <button id="login_btn_submit" onclick="doLogin()">ログイン</button>
        <button id="login_btn_cancel" onclick="closeLoginDialog()">キャンセル</button>
    </div>
</div>

    <script src="resource.js"></script>
    <script src="auth.js"></script>
    <script src="gantt-setup.js"></script>
    <script src="data.js"></script>
    <script src="archive.js"></script>
</body>
</html>
